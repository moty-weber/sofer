<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sofer video cloud</title>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-dark: #121824;
            --card-bg: #1c2638;
            --drive-blue: #1a73e8;
            --drive-green: #0f9d58;
            --drive-yellow: #f4b400;
            --text-light: #ffffff;
            --text-muted: #9aa0a6;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
        }

        /* גאנצע אינהאלט איז באהאלטן ביז מען לאגירט אריין */
        #mainApp { display: none; }

        header {
            background-color: var(--card-bg);
            border-bottom: 3px solid var(--drive-blue);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-area h1 { margin: 0; font-size: 24px; }

        .menu-area { display: flex; align-items: center; gap: 15px; }
        
        /* די קנעפלעך אויבן רעכטס */
        .nav-btn {
            background-color: #25334a;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }
        .nav-btn:hover { background-color: var(--drive-blue); }
        #adminBtn { display: none; background-color: #7b1fa2; } /* נאר פארן עדמין */

        .profile-pic { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--drive-blue); object-fit: cover; background-color: white; }

        .breadcrumb-container { padding: 15px 25px; background-color: rgba(28, 38, 56, 0.5); display: flex; align-items: center; gap: 10px; }
        .back-btn { background-color: var(--drive-blue); border: none; color: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .breadcrumbs { color: var(--text-muted); font-size: 16px; }
        .breadcrumbs a { color: var(--drive-yellow); text-decoration: none; margin: 0 5px; font-weight: bold; }
        .breadcrumbs span { margin: 0 5px; color: var(--text-light); }

        .main-container { padding: 25px; max-width: 1400px; margin: 0 auto; }
        .section-title { border-left: 5px solid var(--drive-yellow); padding-left: 10px; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; justify-content: center; }

        .card { background-color: var(--card-bg); border-radius: 8px; overflow: hidden; transition: transform 0.2s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .card:hover { transform: translateY(-5px); }
        .card.folder { border-top: 4px solid var(--drive-yellow); }
        .card.video { border-top: 4px solid var(--drive-green); }

        .thumbnail-placeholder { height: 130px; background: #25334a; display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; }
        .card-info { padding: 12px; }
        .card-title { font-size: 15px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }

        /* עדמין באטראף אויף יעדן קארד - נאר פארן עדמין */
        .admin-card-overlay {
            display: none;
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.8);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--drive-yellow);
            z-index: 5;
        }

        .download-icon-btn { position: absolute; bottom: 10px; right: 10px; background-color: var(--drive-blue); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 2; }

        /* לאגין און ריקוועסט סקרין פלאנסטער */
        .lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center; align-items: center;
            z-index: 2000;
        }
        .lock-box {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%; max-width: 400px;
            border-top: 4px solid var(--drive-blue);
        }
        .lock-box input, .lock-box textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            background-color: var(--bg-dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 6px; box-sizing: border-box;
        }
        .lock-box button {
            width: 100%; padding: 12px; background-color: var(--drive-blue);
            color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .lock-box button:hover { background-color: var(--drive-green); }
        .switch-link { color: var(--drive-yellow); cursor: pointer; display: inline-block; margin-top: 15px; font-size: 14px; }

        /* פלעיער מאדאל */
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .player-content { width: 80%; max-width: 900px; position: relative; background-color: var(--bg-dark); padding: 10px; border-radius: 8px; }
        .close-player { position: absolute; top: -40px; right: 0; color: white; font-size: 30px; background: none; border: none; cursor: pointer; z-index: 1010; }
        .video-wrapper { position: relative; width: 100%; }
        .video-watermark { position: absolute; bottom: 55px; right: 15px; width: 50px; height: 50px; opacity: 0.6; pointer-events: none; z-index: 10; object-fit: contain; }
        .vjs-skip-button { font-size: 1.5em; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #ccc; }
    </style>
</head>
<body>

    <div class="lock-screen" id="lockScreen">
        <div class="lock-box" id="loginPanel">
            <h2 style="margin-top:0; color: var(--drive-yellow);">sofer cloud access</h2>
            <p style="color: var(--text-muted); font-size: 14px;">Enter your personal access token to unlock the library.</p>
            <input type="password" id="accessTokenInput" placeholder="Enter Access Token...">
            <button onclick="checkAccess()">Unlock Library</button>
            <span class="switch-link" onclick="togglePanels(true)">Don't have access? Request Access</span>
        </div>

        <div class="lock-box" id="requestPanel" style="display: none;">
            <h2 style="margin-top:0; color: var(--drive-blue);">Request Access</h2>
            <p style="color: var(--text-muted); font-size: 14px;">Fill out your details to request cloud credentials.</p>
            <input type="text" id="reqName" placeholder="Your Full Name...">
            <input type="email" id="reqEmail" placeholder="Your Email Address...">
            <textarea id="reqNote" placeholder="Reason for request (optional)..." rows="3"></textarea>
            <button onclick="submitAccessRequest()">Submit Request</button>
            <span class="switch-link" onclick="togglePanels(false)">Already have a token? Log In</span>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div class="brand-area">
                <h1>sofer video cloud</h1>
            </div>
            <div class="menu-area">
                <a href="about.html" class="nav-btn">About Me</a>
                <button id="adminBtn" class="nav-btn" onclick="alert('Welcome Admin! You can now see the Change Thumbnail options on each card.')">Admin Panel</button>
                <img src="logo.png" class="profile-pic" alt="Profile" onerror="this.src='https://via.placeholder.com/45?text=sofer'">
            </div>
        </header>

        <div class="breadcrumb-container">
            <button class="back-btn" onclick="goBack()">← Back</button>
            <div class="breadcrumbs" id="breadcrumbs"></div>
        </div>

        <div class="main-container">
            <h2 class="section-title">Folders</h2>
            <div class="grid" id="foldersGrid"></div>
            <div style="margin-top: 40px;"></div>
            <h2 class="section-title">Videos</h2>
            <div class="grid" id="videosGrid"></div>
        </div>
    </div>

    <div class="player-modal" id="playerModal" onclick="closeVideoFromOutside(event)">
        <div class="player-content" onclick="event.stopPropagation()">
            <button class="close-player" onclick="closeVideo()">×</button>
            <div class="video-wrapper">
                <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="900" height="500">
                    <p class="vjs-no-js">To view this video please enable JavaScript</p>
                </video>
                <img src="logo.png" class="video-watermark" alt="WM" onerror="this.style.display='none'">
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    
    <script>
        // ************************************************************
        // 1) דא קומט דיין פערזענליכע API KEY פונקטליך צווישן די קוואטס:
        const API_KEY = "AIzaSyDEkcoogK9_8e4HOf7vSWFWEHKct21gjdE"; 
        const START_FOLDER_ID = "14v9raW-BX5EkdfK2-Yj8wDA5kGok2Tda"; 

        // 2) דא סעטסטו אויס די צוטריט קאודס (Tokens) פאר דיין סייט:
        const USER_TOKEN = "sofer123";      // קאוד פאר פשוט'ע באנוצער
        const ADMIN_TOKEN = "soferadmin";   // סודיע'דיגע קאוד פאר דיר (דער עדמין)
        // ************************************************************

        let folderHistory = [{ id: START_FOLDER_ID, name: "Home" }];
        let playerInstance = null;
        let isAdmin = false;

        function togglePanels(showRequest) {
            document.getElementById('loginPanel').style.display = showRequest ? 'none' : 'block';
            document.getElementById('requestPanel').style.display = showRequest ? 'block' : 'none';
        }

        function checkAccess() {
            const input = document.getElementById('accessTokenInput').value;
            if (input === ADMIN_TOKEN) {
                isAdmin = true;
                document.getElementById('adminBtn').style.display = 'block';
                unlockApp();
            } else if (input === USER_TOKEN) {
                isAdmin = false;
                unlockApp();
            } else {
                alert('Invalid Token! Please try again.');
            }
        }

        function unlockApp() {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            playerInstance = videojs('my-video');
            setupCustomButtons();
            loadFolder(START_FOLDER_ID, "Home");
        }

        function submitAccessRequest() {
            const name = document.getElementById('reqName').value;
            const email = document.getElementById('reqEmail').value;
            const note = document.getElementById('reqNote').value;

            if(!name || !email) { alert('Please fill in Name and Email.'); return; }

            const subject = encodeURIComponent("sofer Cloud Access Request");
            const body = encodeURIComponent(`Hello Admin,\n\nI would like to request access to the sofer Video Cloud.\n\nName: ${name}\nEmail: ${email}\nNotes: ${note}`);
            
            // דיין אימעיל אדרעס איז שוין דא פערפעקט אריינגעבויט:
            window.location.href = `mailto:mw6559154@gmail.com?subject=${subject}&body=${body}`;
            alert('Your request email layout has been created! Please click send on your mail application.');
        }

        function setupCustomButtons() {
            const controlBar = playerInstance.controlBar;
            const volumeControl = controlBar.volumePanel.el();

            const backBtn = document.createElement('button');
            backBtn.className = 'vjs-control vjs-button vjs-skip-button';
            backBtn.innerHTML = '⏪';
            backBtn.onclick = function() { playerInstance.currentTime(playerInstance.currentTime() - 10); };

            const fwdBtn = document.createElement('button');
            fwdBtn.className = 'vjs-control vjs-button vjs-skip-button';
            fwdBtn.innerHTML = '⏩';
            fwdBtn.onclick = function() { playerInstance.currentTime(playerInstance.currentTime() + 10); };

            volumeControl.parentNode.insertBefore(backBtn, volumeControl.nextSibling);
            backBtn.parentNode.insertBefore(fwdBtn, backBtn.nextSibling);
        }

        async function loadFolder(folderId, folderName) {
            const index = folderHistory.findIndex(f => f.id === folderId);
            if (index !== -1) { folderHistory = folderHistory.slice(0, index + 1); } 
            else { folderHistory.push({ id: folderId, name: folderName }); }

            updateBreadcrumbs();
            
            const foldersGrid = document.getElementById('foldersGrid');
            const videosGrid = document.getElementById('videosGrid');
            foldersGrid.innerHTML = 'Loading...';
            videosGrid.innerHTML = 'Loading...';

            try {
                const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,thumbnailLink)&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                foldersGrid.innerHTML = '';
                videosGrid.innerHTML = '';

                if (data.files && data.files.length > 0) {
                    data.files.forEach(file => {
                        const card = document.createElement('div');
                        const adminStyle = isAdmin ? 'style="display:block;"' : '';
                        const adminOverlay = `<div class="admin-card-overlay" ${adminStyle} onclick="changeThumbnailPrompt('${file.id}', event)">⚙️ Edit Thumbnail</div>`;

                        if (file.mimeType === 'application/vnd.google-apps.folder') {
                            card.className = 'card folder';
                            card.onclick = () => loadFolder(file.id, file.name);
                            card.innerHTML = `
                                ${adminOverlay}
                                <div class="thumbnail-placeholder" id="thumb-${file.id}">📁</div>
                                <div class="card-info"><p class="card-title">${file.name}</p></div>
                            `;
                            foldersGrid.appendChild(card);
                        } else if (file.mimeType.startsWith('video/')) {
                            card.className = 'card video';
                            card.onclick = (e) => { if(!e.target.classList.contains('download-icon-btn') && !e.target.classList.contains('admin-card-overlay')) playVideo(file.id); };
                            card.innerHTML = `
                                ${adminOverlay}
                                <div class="thumbnail-placeholder" id="thumb-${file.id}">
                                    ${file.thumbnailLink ? `<img src="${file.thumbnailLink}" style="width:100%;height:100%;object-fit:cover;">` : '🎬'}
                                </div>
                                <div class="card-info"><p class="card-title">${file.name}</p></div>
                                <button class="download-icon-btn" onclick="downloadVideo('${file.id}')" title="Download">↓</button>
                            `;
                            videosGrid.appendChild(card);
                        }
                    });
                } else {
                    foldersGrid.innerHTML = '<p style="color:var(--text-muted)">No folders here.</p>';
                    videosGrid.innerHTML = '<p style="color:var(--text-muted)">No videos here.</p>';
                }
            } catch (error) {
                foldersGrid.innerHTML = '<p style="color:red">Error loading files.</p>';
            }
        }

        function changeThumbnailPrompt(fileId, event) {
            event.stopPropagation();
            const newImgUrl = prompt("Enter the absolute URL of the new image thumbnail:");
            if (newImgUrl) {
                const container = document.getElementById(`thumb-${fileId}`);
                container.innerHTML = `<img src="${newImgUrl}" style="width:100%;height:100%;object-fit:cover;">`;
                alert("Thumbnail updated on screen! (Temporary for this session).");
            }
        }

        function goBack() {
            if (folderHistory.length > 1) {
                folderHistory.pop();
                const prev = folderHistory[folderHistory.length - 1];
                folderHistory.pop(); 
                loadFolder(prev.id, prev.name);
            }
        }

        function updateBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            let html = '';
            folderHistory.forEach((folder, idx) => {
                if (idx === folderHistory.length - 1) { html += `<span>${folder.name}</span>`; } 
                else { html += `<a href="#" onclick="loadFolder('${folder.id}', '${folder.name}')">${folder.name}</a> / `; }
            });
            container.innerHTML = html;
        }

        function playVideo(fileId) {
            document.getElementById('playerModal').style.display = 'flex';
            playerInstance.src({ type: 'video/mp4', src: `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}` });
            playerInstance.playbackRates([0.5, 1, 1.25, 1.5, 2]);
            playerInstance.play();

            const videoEl = playerInstance.tech({ IWillNotUseThisInAMonth: true }).el();
            playerInstance.off('doubleclick'); playerInstance.off('dblclick');
            videoEl.ondblclick = function(e) {
                e.preventDefault();
                const rect = videoEl.getBoundingClientRect();
                if ((e.clientX - rect.left) > rect.width / 2) { playerInstance.currentTime(playerInstance.currentTime() + 10); } 
                else { playerInstance.currentTime(playerInstance.currentTime() - 10); }
            };
        }

        function closeVideoFromOutside(event) { closeVideo(); }
        function closeVideo() { document.getElementById('playerModal').style.display = 'none'; playerInstance.pause(); }
        function downloadVideo(fileId) { window.open(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`, '_blank'); }
    </script>
</body>
</html>
